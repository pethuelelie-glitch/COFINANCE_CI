<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page introuvable · COFINANCE CI</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="assets/css/base.css" />
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-body)">

<div style="text-align:center;max-width:560px;padding:32px">
  <!-- Brand -->
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:48px">
    <div style="width:36px;height:36px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--c-primary),var(--c-primary-hover));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;color:#fff;box-shadow:0 4px 12px rgba(29,78,216,.3)">CI</div>
    <span style="font-size:.95rem;font-weight:800;color:var(--t-primary);letter-spacing:.04em">COFINANCE CI</span>
  </div>

  <!-- 404 visual -->
  <div style="font-size:6rem;font-weight:900;color:var(--c-primary);letter-spacing:-.06em;line-height:1;margin-bottom:8px;opacity:.15">404</div>
  <div style="position:relative;margin-top:-80px;margin-bottom:32px">
    <div style="font-size:5rem;line-height:1">🔍</div>
  </div>

  <h1 style="font-size:1.8rem;font-weight:800;color:var(--t-primary);letter-spacing:-.04em;margin-bottom:12px">Page introuvable</h1>
  <p style="font-size:.95rem;color:var(--t-muted);line-height:1.7;margin-bottom:36px">
    La page que vous cherchez n'existe pas ou a été déplacée. Vérifiez l'URL ou retournez à l'accueil.
  </p>

  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <button onclick="history.back()" class="btn btn-outline btn-lg">← Retour</button>
    <a href="index.html" class="btn btn-primary btn-lg">Aller à l'accueil</a>
  </div>

  <div style="margin-top:48px;font-size:.82rem;color:var(--t-light)">
    Besoin d'aide ? <a href="mailto:contact@cofci.ci" style="color:var(--c-primary);font-weight:600">contact@cofci.ci</a>
  </div>
</div>

<script src="assets/js/core.js"></script>
</body>
</html>
