  <main class="app-content">

    <div class="tab-bar mb-6">
      <button class="tab-btn active" onclick="showInsTab('polices', this)">Mes polices</button>

    <div id="tab-catalogue" style="display:none">
      <div id="productsList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px"><div style="text-align:center;padding:48px"><div class="spinner" style="margin:0 auto"></div></div></div>
    </div>

</div>

<!-- Modal souscription -->
<div class="modal-overlay" id="subscribeModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Souscrire à une assurance</h3>
      <button class="modal-close" onclick="Modal.close('subscribeModal')">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:.875rem;color:var(--t-muted);margin-bottom:20px">Produit : <strong id="subscribeProductName"></strong></p>
      <div class="form-group">
        <label class="form-label">Date de début <span class="req">*</span></label>
        <input type="date" id="subscribeStartDate" class="form-control" />
      </div>
      <div class="form-group">
        <label class="form-label">Date de fin <span class="req">*</span></label>
        <input type="date" id="subscribeEndDate" class="form-control" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('subscribeModal')">Annuler</button>
      <button class="btn btn-primary" onclick="confirmSubscribe()">Confirmer</button>
    </div>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
let subscribeProductId = null;

function showInsTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-polices').style.display   = tab === 'polices'   ? '' : 'none';
  document.getElementById('tab-catalogue').style.display = tab === 'catalogue' ? '' : 'none';
}

function openSubscribeModal(productId, productName) {
  subscribeProductId = productId;
  document.getElementById('subscribeProductName').textContent = productName;
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('subscribeStartDate').value = today;
  Modal.open('subscribeModal');
}

async function confirmSubscribe() {
  const start = document.getElementById('subscribeStartDate').value;
  const end   = document.getElementById('subscribeEndDate').value;
  if (!start || !end) { Toast.show('Dates requises', 'error'); return; }
  try {
    await Http.post(API.insuranceSubscribe, { produit: subscribeProductId, date_debut: start, date_fin: end });
    Modal.close('subscribeModal');
    Toast.show('Souscription réussie !', 'success');
    InsurancePage.init();
  } catch (err) {
    Toast.show('Erreur', 'error', err.message);
  }
}

window.showInsTab = showInsTab;
window.openSubscribeModal = openSubscribeModal;
window.confirmSubscribe = confirmSubscribe;
</script>
