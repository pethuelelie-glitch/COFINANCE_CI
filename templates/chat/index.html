<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COFINANCE CI — Chat Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d4f3c 0%, #1a7a5e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 720px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        .chat-header {
            background: #0d4f3c;
            color: #fff;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h1 { font-size: 1.1rem; font-weight: 600; }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-dot.connected { background: #4ade80; }
        .status-dot.disconnected { background: #f87171; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8faf9;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .message.mine {
            align-self: flex-end;
            background: #0d4f3c;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: #e8f5f0;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }
        .message .meta {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 4px;
        }
        .typing-indicator {
            padding: 0 20px 8px;
            font-size: 0.85rem;
            color: #666;
            font-style: italic;
            min-height: 24px;
        }
        .chat-input {
            display: flex;
            padding: 16px;
            border-top: 1px solid #e5e7eb;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 24px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input input:focus { border-color: #0d4f3c; }
        .chat-input button {
            background: #0d4f3c;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .chat-input button:hover { background: #1a7a5e; }
        .error-banner {
            background: #fef2f2;
            color: #b91c1c;
            padding: 12px 20px;
            font-size: 0.9rem;
            display: none;
        }
        .error-banner.visible { display: block; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>COFINANCE CI — Support Client</h1>
            <span><span id="statusDot" class="status-dot disconnected"></span><span id="statusText">Déconnecté</span></span>
        </div>
        <div id="errorBanner" class="error-banner"></div>
        <div id="messages" class="messages"></div>
        <div id="typingIndicator" class="typing-indicator"></div>
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Écrivez votre message..." autocomplete="off">
            <button id="sendBtn">Envoyer</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const conversationId = params.get('conversation_id');
        const token = params.get('token');

        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingEl = document.getElementById('typingIndicator');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const errorBanner = document.getElementById('errorBanner');

        let socket = null;
        let currentUserId = null;
        let typingTimeout = null;

        function showError(msg) {
            errorBanner.textContent = msg;
            errorBanner.classList.add('visible');
        }

        function parseJwt(token) {
            try {
                const payload = token.split('.')[1];
                return JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
            } catch { return null; }
        }

        function appendMessage(content, auteurName, auteurId, timestamp, isMine) {
            const div = document.createElement('div');
            div.className = 'message ' + (isMine ? 'mine' : 'other');
            const time = timestamp ? new Date(timestamp).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) : '';
            div.innerHTML = `<div>${content}</div><div class="meta">${auteurName || ''} ${time}</div>`;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function loadHistory() {
            const resp = await fetch(`/api/chat/conversations/${conversationId}/messages/`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!resp.ok) return;
            const data = await resp.json();
            data.forEach(m => {
                appendMessage(m.contenu, m.auteur_name, m.auteur, m.timestamp, m.auteur === currentUserId);
            });
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/chat/${conversationId}/?token=${token}`;
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusDot.className = 'status-dot connected';
                statusText.textContent = 'Connecté';
                socket.send(JSON.stringify({ type: 'read' }));
            };

            socket.onclose = () => {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Déconnecté';
            };

            socket.onerror = () => showError('Erreur de connexion WebSocket.');

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'message') {
                    const m = data.message;
                    appendMessage(m.contenu, m.auteur_name, m.auteur_id, m.timestamp, m.auteur_id === currentUserId);
                } else if (data.type === 'typing') {
                    typingEl.textContent = data.is_typing ? `${data.user_name} est en train d'écrire...` : '';
                }
            };
        }

        function sendMessage() {
            const content = inputEl.value.trim();
            if (!content || !socket || socket.readyState !== WebSocket.OPEN) return;
            socket.send(JSON.stringify({ type: 'message', content }));
            inputEl.value = '';
        }

        inputEl.addEventListener('input', () => {
            if (!socket || socket.readyState !== WebSocket.OPEN) return;
            socket.send(JSON.stringify({ type: 'typing', is_typing: true }));
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.send(JSON.stringify({ type: 'typing', is_typing: false }));
            }, 1500);
        });

        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        if (!conversationId || !token) {
            showError('Paramètres manquants : ?conversation_id=ID&token=JWT_ACCESS_TOKEN');
        } else {
            const jwt = parseJwt(token);
            currentUserId = jwt ? jwt.user_id : null;
            loadHistory().then(connectWebSocket);
        }
    </script>
</body>
</html>
